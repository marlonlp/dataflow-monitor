name: Deploy to Firebase Hosting on merge
'on':
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DATAFLOW_MONITOR_MOCKUP || secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: dataflow-monitor-mockup
          entryPoint: .
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
